description: >-
  Rossum sells four published tiers — Starter, Business, Enterprise and
  Ultimate — with pricing scaling by document volume and workflow complexity.
  Annual contracts; one-year minimum. Per-page overage pricing applies above
  the negotiated bundle.
notes: >-
  Starter starts from $18,000/year and includes unlimited seats, ingestion,
  AI extraction, validation screen and API access. Higher tiers add SAP/Coupa
  integrations, SSO, sandbox, custom branding and document translation.
sources:
- https://rossum.ai/pricing/
