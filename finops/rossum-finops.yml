description: >-
  FOCUS-aligned FinOps profile for Rossum. Billing is annual subscription
  contract (Starter from $18,000/yr; Business / Enterprise / Ultimate by
  sales) with a negotiated document-or-page bundle and per-page overage if
  the bundle is exceeded. One-year minimum.
notes: >-
  Annotation lifecycle (importing → to_review → confirmed → exported) gives
  granular allocation hooks. Queue-level chargeback is the cleanest mapping
  to teams / business units.
sources:
- https://rossum.ai/pricing/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Rossum
serviceCategory: Document AI / AP Automation
billingModel:
  pricingCategory: Subscription + Usage (page overage)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Rossum
  ServiceCategory: AI / IDP
  ProviderName: Rossum
  PublisherName: Rossum
  InvoiceIssuerName: Rossum
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingUnit: page
meters:
- name: subscription_contract
  description: Annual contract fee.
  unit: contract-year
  aggregation: sum
  dimensions:
  - account
  - tier
- name: pages_processed
  description: Pages processed against the negotiated bundle.
  unit: page
  aggregation: sum
  dimensions:
  - workspace
  - queue
- name: page_overage
  description: Pages above the contract bundle.
  unit: page
  aggregation: sum
  dimensions:
  - workspace
  - queue
- name: documents_processed
  description: Documents processed (informational; pricing is per-page).
  unit: document
  aggregation: sum
  dimensions:
  - queue
- name: api_calls
  description: REST API calls consumed (informational; not directly billed).
  unit: request
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Use queue-level annotation counts for chargeback; reconcile against monthly usage exports.
- name: Allocation
  description: One queue per business unit / vendor / channel; map queues to FOCUS ResourceTag.
- name: Optimization
  description: Tune extraction schemas to reduce review touches; right-size the contract bundle annually.
- name: Accountability
  description: Assign queue owners; monitor approaching bundle exhaustion to renegotiate vs. pay overage.
